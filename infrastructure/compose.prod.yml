# Production-specific overrides
services:
  traefik:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik.kraeuterakademie.it`)"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_AUTH}"

  nuxt:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nuxt.rule=Host(`kraeuterakademie.it`) || Host(`www.kraeuterakademie.it`)"
      - "traefik.http.routers.nuxt.entrypoints=websecure"
      - "traefik.http.routers.nuxt.tls.certresolver=letsencrypt"
      - "traefik.http.services.nuxt.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  storybook:
    image: ghcr.io/felixrizzolli/kraeuterakademie-it-storybook:${STORYBOOK_VERSION:-latest}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storybook.rule=Host(`storybook.kraeuterakademie.it`)"
      - "traefik.http.routers.storybook.entrypoints=websecure"
      - "traefik.http.routers.storybook.tls.certresolver=letsencrypt"
      - "traefik.http.services.storybook.loadbalancer.server.port=6006"
    networks:
      - kraeuterakademie

  payload:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payload.rule=Host(`api.kraeuterakademie.it`)"
      - "traefik.http.routers.payload.entrypoints=websecure"
      - "traefik.http.routers.payload.tls.certresolver=letsencrypt"
      - "traefik.http.services.payload.loadbalancer.server.port=3001"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      ENVIRONMENT: production
