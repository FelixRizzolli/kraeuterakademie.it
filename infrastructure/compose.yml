# Base configuration - shared by all environments
services:
  traefik:
    image: traefik:v3.6
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=sigrid.thaler@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt-data:/letsencrypt"
    networks:
      - kraeuterakademie

  nuxt:
    image: ghcr.io/felixrizzolli/kraeuterakademie-it-nuxt:${NUXT_VERSION:-latest}
    environment:
      PAYLOAD_API_URL: ${PAYLOAD_API_URL}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://${NUXT_HOST}:${NUXT_PORT}",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - kraeuterakademie
    depends_on:
      - payload
      # payload:
      #   condition: service_healthy

  payload:
    image: ghcr.io/felixrizzolli/kraeuterakademie-it-payload:${PAYLOAD_VERSION:-latest}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PAYLOAD_HOST: ${PAYLOAD_HOST}
      PAYLOAD_PORT: ${PAYLOAD_PORT}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_DATABASE_URI: ${PAYLOAD_DATABASE_URI}
    # healthcheck:
    #   test:
    #     [
    #       "CMD",
    #       "wget",
    #       "--no-verbose",
    #       "--tries=1",
    #       "--spider",
    #       "http://${PAYLOAD_HOST}:${PAYLOAD_PORT}/api/health",
    #     ]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 60s
    restart: unless-stopped
    networks:
      - kraeuterakademie
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:18.1
    environment:
      DATABASE_NAMES: ${DATABASE_NAMES}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGOPTIONS: "-c log_statement=all -c log_connections=on -c log_disconnections=on"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ../scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kraeuterakademie

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/docker-volumes/kraeuterakademie.it/${ENVIRONMENT:-production}/postgres
  letsencrypt-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/docker-volumes/kraeuterakademie.it/letsencrypt

networks:
  kraeuterakademie:
    driver: bridge
