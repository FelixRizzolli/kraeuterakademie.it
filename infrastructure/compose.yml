# Application infrastructure: database and shared volumes.
# The reverse proxy (Traefik) lives in compose.proxy.yml and is shared
# across all projects on this server.
#
# IMPORTANT: `name: kraeuterakademie` below gives this stack an explicit,
# unique Docker Compose project name.  Without it, Docker Compose would
# fall back to the directory name ("infrastructure"), which every other
# project on the same server also uses. That collision makes Docker Compose
# treat containers from foreign projects as orphans of THIS project and
# potentially remove them on every deployment.
name: kraeuterakademie

services:
  database:
    container_name: "kraeuterakademie-it-database"
    image: postgres:18.3
    environment:
      DATABASE_NAMES: ${DATABASE_NAMES}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGOPTIONS: "-c log_statement=all -c log_connections=on -c log_disconnections=on"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ../scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kraeuterakademie

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/docker-volumes/kraeuterakademie.it/${ENVIRONMENT:-production}/postgres
  payload-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/docker-volumes/kraeuterakademie.it/${ENVIRONMENT:-production}/payload-data

networks:
  # External network shared with all other projects on this server.
  # Created once by compose.proxy.yml / init-server.sh.
  traefik-public:
    external: true
  # Internal network for service-to-service communication within this project.
  kraeuterakademie:
    driver: bridge
